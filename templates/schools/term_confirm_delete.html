{% extends 'base.html' %}
{% block title %}Delete Term{% endblock %}
{% block page_title %}Delete Term{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div style="font-size:3rem;" class="text-danger mb-3">
        <i class="bi bi-calendar-x"></i>
      </div>
      <h5 class="fw-bold">Delete Term?</h5>
      <p class="text-muted">
        Are you sure you want to delete
        <strong>{{ term.name }}</strong>?
        This will also delete all duty assignments for this term.
      </p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
          <i class="bi bi-trash me-1"></i> Yes, Delete
        </button>
        <a href="{% url 'term_list' %}" class="btn btn-outline-secondary">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
