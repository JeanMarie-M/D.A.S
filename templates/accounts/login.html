<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Duty Allocation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 5px;
    }
    .login-card .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }
    .btn-login {
      background: #1a1a2e;
      color: white;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-login:hover { background: #e2b714; color: #1a1a2e; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <i class="bi bi-clipboard2-check text-warning"></i> DAS
  </div>
  <div class="subtitle">Duty Allocation System</div>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>
  </form>
  <p class="text-center text-muted small mt-3">
  New school?
  <a href="{% url 'school_register' %}">Register here</a>
</p>
<p class="text-center text-muted small mt-1">
  <a href="{% url 'home' %}">← Back to Home</a>
</p>
</div>
</body>
</html>
